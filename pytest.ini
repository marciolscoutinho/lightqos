[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -ra
    -q
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Custom markers
markers =
    slow: marks slow tests (deselect with '-m "not slow"')
    integration: integration tests
    benchmark: performance tests
    pyo3: tests that require the Rust module

# Async
asyncio_mode = auto

# Coverage
[coverage:run]
source = lightqos
branch = True

[coverage:report]
precision = 2
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:

# Timeouts
timeout = 300
timeout_method = thread
