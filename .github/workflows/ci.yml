name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_VERSION: "3.11"
  RUST_VERSION: "1.75"

jobs:
  # ==========================================================================
  # Rust — build, clippy, tests
  # ==========================================================================
  rust-ci:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting (rustfmt)
        run: cargo fmt --all -- --check

      - name: Static analysis (clippy)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Compile (debug)
        run: cargo build --workspace --all-features

      - name: Rust unit tests
        run: cargo test --workspace --all-features -- --test-threads=4

      - name: Documentation tests
        run: cargo test --workspace --doc

  # ==========================================================================
  # Python — pytest, mypy, ruff
  # ==========================================================================
  python-ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio ruff mypy

      - name: Linting (ruff)
        run: ruff check frontend/ the_light/ tests/ examples/

      - name: Type checking (mypy)
        run: mypy frontend/lightqos/ the_light/ --ignore-missing-imports
        continue-on-error: true  # Do not block — mypy in incremental mode

      - name: Install Python SDK (without compiling Rust)
        run: pip install -e frontend/ --no-build-isolation
        continue-on-error: true

      - name: Python tests (without Rust kernel)
        run: |
          pytest tests/ -v \
            --cov=frontend/lightqos \
            --cov-report=xml \
            --cov-report=term-missing \
            --ignore=tests/test_pyo3_integration.py \
            -m "not requires_hardware"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: python
          name: python-coverage

  # ==========================================================================
  # PyO3 — compile bindings + integration tests
  # ==========================================================================
  pyo3-integration:
    name: PyO3 Integration (Ubuntu)
    runs-on: ubuntu-latest
    needs: [rust-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ubuntu-pyo3-${{ hashFiles('kernel/Cargo.toml') }}

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install maturin
        run: pip install maturin

      - name: Compile PyO3 extension (kernel)
        run: maturin develop --manifest-path kernel/Cargo.toml --features pyo3/extension-module

      - name: Install Python SDK
        run: pip install -e frontend/

      - name: PyO3 integration tests
        run: pytest tests/test_pyo3_integration.py -v --tb=short

  # ==========================================================================
  # Benchmarks (only on main)
  # ==========================================================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [rust-ci, python-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Rust benchmarks (criterion)
        run: cargo bench --workspace --no-fail-fast 2>&1 | tee benchmark_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmark_results.txt
            target/criterion/

  # ==========================================================================
  # Security — cargo audit + pip-audit
  # ==========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies (cargo)
        run: cargo audit --workspace

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit Python dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969

  # ==========================================================================
  # Documentation — check links and build
  # ==========================================================================
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check links in README
        run: markdown-link-check README.md --config .mlc-config.json || true

      - name: Check links in docs/
        run: |
          find docs/ -name "*.md" -exec markdown-link-check {} \; || true

      - name: Check Rust docs (rustdoc)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - run: cargo doc --workspace --no-deps --all-features 2>&1 | grep -E "^error" && exit 1 || true
