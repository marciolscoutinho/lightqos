name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  RUST_VERSION: "1.75"

jobs:
  # ==========================================================================
  # Pre-release validation
  # ==========================================================================
  validate:
    name: Validate version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Check version in Cargo.toml
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ Tag ($TAG_VERSION) ≠ Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "✅ Version validated: $TAG_VERSION"

      - name: Check version in pyproject.toml
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          PY_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$PY_VERSION" ]; then
            echo "❌ Tag ($TAG_VERSION) ≠ pyproject.toml ($PY_VERSION)"
            exit 1
          fi
          echo "✅ pyproject.toml OK"

  # ==========================================================================
  # Build Python wheels (maturin)
  # ==========================================================================
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [validate]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: auto
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
          - runner: macos-latest
            target: x86_64-apple-darwin
            manylinux: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: >
            --release
            --out dist/
            --manifest-path kernel/Cargo.toml
            --interpreter python3.10 python3.11 python3.12
          rust-toolchain: ${{ env.RUST_VERSION }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # ==========================================================================
  # Build sdist
  # ==========================================================================
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build sdist (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist/ --manifest-path kernel/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ==========================================================================
  # Publish to PyPI
  # ==========================================================================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    environment: pypi

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # ==========================================================================
  # Publish to crates.io
  # ==========================================================================
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Publish crates (dependency order)
        run: |
          cargo publish -p lightqos-math --token ${{ secrets.CRATES_IO_TOKEN }} || true
          sleep 30
          cargo publish -p lightqos-process-tensor --token ${{ secrets.CRATES_IO_TOKEN }} || true
          cargo publish -p lightqos-shadow-tomography --token ${{ secrets.CRATES_IO_TOKEN }} || true
          cargo publish -p lightqos-simulators --token ${{ secrets.CRATES_IO_TOKEN }} || true
          cargo publish -p lightqos-protocols --token ${{ secrets.CRATES_IO_TOKEN }} || true
          cargo publish -p lightqos-drivers --token ${{ secrets.CRATES_IO_TOKEN }} || true
          sleep 30
          cargo publish -p lightqos-kernel --token ${{ secrets.CRATES_IO_TOKEN }} || true
          cargo publish -p lightqos-cli --token ${{ secrets.CRATES_IO_TOKEN }} || true

  # ==========================================================================
  # Create GitHub Release with changelog notes
  # ==========================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Version: $VERSION"
          # Extract the corresponding section from CHANGELOG.md (if it exists)
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1)
          else
            NOTES="Version $VERSION — see README.md for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LightQOS v${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
